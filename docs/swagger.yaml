info:
  contact: {}
  description: API for Synconomics, build with go
  termsOfService: http://swagger.io/terms/
  title: Synconomics API
  version: "1.0"
paths:
  /ai/chat/idea-generation:
    post:
      consumes:
      - application/json
      description: Mengirim pesan ke AI dengan role Idea Generation (otomatis session)
      parameters:
      - description: Chat Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChatWithRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/helpers.Response'
      security:
      - BearerAuth: []
      summary: Chat khusus Idea Generation
      tags:
      - ai
  /ai/chat/strategy:
    post:
      consumes:
      - application/json
      description: Mengirim pesan ke AI dengan role Business Strategy (otomatis session)
      parameters:
      - description: Chat Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChatWithRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helpers.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AIMessageResponse'
              type: object
      security:
      - BearerAuth: []
      summary: Chat khusus Business Strategy
      tags:
      - ai
  /ai/chat/validation:
    post:
      consumes:
      - application/json
